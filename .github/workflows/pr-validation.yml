name: PR Validation

on:
    pull_request:
        types: [opened, synchronize, reopened]
        branches:
            - 'main'

permissions:
    contents: read

jobs:
    validate:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                variant: [default, foss]

        steps:
            - name: Checkout code
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Setup Environment and Install Dependencies
              uses: ./.github/actions/setup-environment
              with:
                  variant: ${{ matrix.variant }}

            - name: Prettier
              if: matrix.variant == 'default'
              run: npx prettier . --check

            - name: Yarn Dedupe Check
              if: matrix.variant == 'default'
              run: yarn dedupe --check

            - name: Lint
              if: matrix.variant == 'default'
              run: yarn lint

            - name: Typecheck
              run: yarn typecheck
              env:
                  EXPO_PUBLIC_FOSS_BUILD: ${{ matrix.variant == 'default' && 'false' || 'true' }}

            - name: Expo Doctor
              if: matrix.variant == 'default'
              run: npx expo-doctor

            - name: Test
              if: matrix.variant == 'default'
              run: yarn test --run --coverage --reporter=junit --outputFile=test-report.junit.xml

            - name: Upload test results to Codecov
              if: ${{ !cancelled() && matrix.variant == 'default' }}
              uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  report_type: test_results

            - name: Upload coverage reports to Codecov
              if: matrix.variant == 'default'
              uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}

            - name: Build
              run: yarn expo export
              env:
                  EXPO_PUBLIC_FOSS_BUILD: ${{ matrix.variant == 'default' && 'false' || 'true' }}
