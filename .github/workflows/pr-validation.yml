name: PR Validation

on:
    pull_request:
        types: [opened, synchronize, reopened]
        branches:
            - 'main'

permissions:
    contents: read

jobs:
    validate:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                variant: [default, foss]

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Enable Corepack
              run: corepack enable

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: 'yarn'

            - name: Install dependencies
              run: yarn install --immutable

            - name: Prepare FOSS Variant
              if: matrix.variant == 'foss'
              run: |
                  sudo apt-get install -y jq
                  jq 'del(.dependencies["expo-location", "expo-notifications"])' package.json > temp.json && mv temp.json package.json
                  yarn install

            - name: Generate License Information Check
              run: yarn generate-licenses

            - name: Typecheck
              if: matrix.variant == 'default' # Typecheck fails on FOSS because the packages are physically uninstalled
              run: yarn typecheck

            - name: Lint
              if: matrix.variant == 'default'
              run: yarn lint

            - name: Build
              run: yarn expo export
              env:
                  EXPO_PUBLIC_FOSS_BUILD: ${{ matrix.variant == 'foss' && 'true' || 'false' }}

            - name: Test
              run: yarn test --run --coverage --reporter=junit --outputFile=test-report.junit.xml

            - name: Upload test results to Codecov
              if: ${{ !cancelled() }}
              uses: codecov/codecov-action@v5
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  report_type: test_results

            - name: Upload coverage reports to Codecov
              uses: codecov/codecov-action@v5
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}

            - name: Expo Doctor
              if: matrix.variant == 'default'
              run: npx expo-doctor

            - name: Yarn Dedupe Check
              run: yarn dedupe --check
