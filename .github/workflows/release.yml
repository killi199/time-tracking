name: Release

on:
    push:
        tags:
            - 'v*'

jobs:
    prepare:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: read
        outputs:
            new_version: ${{ steps.bump.outputs.new_version }}
            new_version_code: ${{ steps.bump.outputs.new_version_code }}
            commit_hash: ${{ steps.auto_commit.outputs.commit_hash || github.sha }}
        steps:
            - name: Checkout code
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  token: ${{ secrets.PAT || secrets.GITHUB_TOKEN }}
                  ref: main
                  fetch-depth: 0

            - name: Bump package.json version and versionCode
              id: bump
              run: |
                  CURRENT_VERSION_CODE=$(jq -r .versionCode package.json)
                  NEW_VERSION_CODE=$((CURRENT_VERSION_CODE + 1))
                  NEW_VERSION=${GITHUB_REF_NAME#v}

                  jq ".versionCode = $NEW_VERSION_CODE | .version = \"$NEW_VERSION\"" package.json > package.tmp.json
                  mv package.tmp.json package.json
                  npx prettier --write package.json

                  echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
                  echo "new_version_code=$NEW_VERSION_CODE" >> $GITHUB_OUTPUT

            - name: Setup Node.js
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
              with:
                  node-version: 24

            - name: Generate F-Droid Changelog
              env:
                  GITHUB_TOKEN: ${{ secrets.PAT || secrets.GITHUB_TOKEN }}
              run: npx tsx .github/scripts/generate-fdroid-changelog.ts ${{ steps.bump.outputs.new_version_code }}

            - name: Commit and push changes
              id: auto_commit
              uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d # v7.2.0
              with:
                  commit_message: 'chore: bump version to ${{ steps.bump.outputs.new_version }} and versionCode to ${{ steps.bump.outputs.new_version_code }} [skip ci]'
                  file_pattern: 'package.json metadata/'

            - name: Move tag to new commit
              if: steps.auto_commit.outputs.changes_detected == 'true'
              run: |
                  git tag -f ${{ github.ref_name }} ${{ steps.auto_commit.outputs.commit_hash }}
                  git push -f origin refs/tags/${{ github.ref_name }}

    build:
        needs: prepare
        runs-on: ubuntu-latest
        permissions:
            contents: read
        strategy:
            fail-fast: false
            matrix:
                variant: [default, foss]
        env:
            EXPO_PUBLIC_FOSS_BUILD: ${{ matrix.variant == 'default' && 'false' || 'true' }}
            NODE_ENV: production

        steps:
            - name: Checkout code
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  ref: ${{ needs.prepare.outputs.commit_hash }}

            - name: Setup Environment and Install Dependencies
              uses: ./.github/actions/setup-environment
              with:
                  variant: ${{ matrix.variant }}

            - name: Setup Java
              uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
              with:
                  distribution: 'zulu'
                  java-version: '17'

            - name: Prebuild Android
              run: npx expo prebuild --platform android --clean

            - name: Configure Gradle Memory
              run: |
                  echo "" >> android/gradle.properties
                  echo "org.gradle.jvmargs=-Xmx3g -XX:MaxMetaspaceSize=1024m" >> android/gradle.properties

            - name: Build Android APK
              working-directory: android
              run: ./gradlew assembleRelease

            - name: Rename APK
              run: find android/app/build/outputs/apk/release -name "*.apk" -exec mv {} android/app/build/outputs/apk/release/time-tracking-${{ matrix.variant }}.apk \;

            - name: Upload APK Artifact
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: apk-${{ matrix.variant }}
                  path: android/app/build/outputs/apk/release/time-tracking-${{ matrix.variant }}.apk
                  if-no-files-found: error

    release:
        needs: [prepare, build]
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Checkout code
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  ref: ${{ needs.prepare.outputs.commit_hash }}

            - name: Download all APKs
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  pattern: apk-*
                  merge-multiple: true
                  path: release-apks/

            - name: Publish Release to GitHub
              uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
              with:
                  files: release-apks/*.apk
                  name: Release ${{ needs.prepare.outputs.new_version }}
                  generate_release_notes: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
